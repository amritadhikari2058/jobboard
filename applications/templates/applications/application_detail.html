<!DOCTYPE html>
<html>
<head>
    <title>Application Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-body">
            <h3 class="card-title">{{ application.job.title }}</h3>
            <p><strong>User:</strong> {{ application.user.username }}</p>
            <p><strong>Status:</strong> 
                <span class="badge bg-info">{{ application.status }}</span>
            </p>

            {% if application.cover_letter %}
                <p>
                    <strong>Resume:</strong>
                    <a href="{{ application.cover_letter.url }}" class="btn btn-sm btn-primary">Download</a>
                </p>
            {% endif %}

            <a href="{% url 'application_list' %}" class="btn btn-secondary mt-3">Back</a>
        </div>
    </div>
</div>
</body>
</html>
