{% extends 'base.html' %}

{% block content %}
<div class="container mt-5" style="max-width: 400px;">
  <div class="card shadow-sm p-4">
    <h3 class="text-center mb-3">Login</h3>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}

      <button type="submit" class="btn btn-primary w-100">
        Login
      </button>
    </form>
  </div>
</div>
{% endblock %}
