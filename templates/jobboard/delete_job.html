{% extends 'base.html' %} {% block title %}Delete Job{% endblock %} {% block content %}
<div class="card shadow p-4 text-center">
  <h4>Delete Job</h4>
  <p>Are you sure you want to delete <strong>{{ job.title }}</strong>?</p>

  <form method="POST">
    {% csrf_token %}
    <button class="btn btn-danger">Yes, Delete</button>
    <a href="{% url 'job_list' %}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
