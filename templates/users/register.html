<h2>Register</h2>

{%if messages%}
{%for message in messages%}
<div class="alert alert-success">{{message}}</div>
{%endfor%}
{%endif%}

<form method='POST'>
    {%csrf_token%}
    {{form.as_p}}
    <button type='submit'>Register</button>
</form>

<a href="{%url 'login'%}">Already have an account? Login </a>
