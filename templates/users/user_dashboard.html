{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

  <h3 class="fw-bold mb-4">My Applications</h3>

  {% for app in applications %}
  <div class="card shadow-sm border-0 mb-3">
    <div class="card-body d-flex justify-content-between align-items-center">

      <!-- Left -->
      <div>
        <h5 class="mb-1 fw-semibold">
          <a href="{% url 'job_detail' app.job.id %}" class="text-decoration-none text-dark">
            {{ app.job.title }}
          </a>
        </h5>
        <small class="text-muted">{{ app.created_at }}</small>
      </div>

      <!-- Right -->
      <div class="text-end">

        <span class="
          badge rounded-pill px-3 py-2 fw-semibold
          {% if app.status == 'pending' %}
            bg-warning-subtle text-dark border
          {% elif app.status == 'accepted' %}
            bg-success-subtle text-success border
          {% elif app.status == 'rejected' %}
            bg-danger-subtle text-danger border
          {% endif %}
        ">
          {{ app.status|title }}
        </span>

      </div>

    </div>
  </div>
  {% empty %}
  <div class="text-center mt-5">
    <h5 class="text-muted">No applications found</h5>
  </div>
  {% endfor %}

</div>
<style>
.card:hover {
  transform: translateY(-3px);
  transition: 0.2s ease;
}
</style>

{% endblock %}
