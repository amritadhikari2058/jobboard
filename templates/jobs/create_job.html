{% extends 'base.html' %}
{% block title %}Create Job{% endblock %}

{% load crispy_forms_tags %}

{% block content %}
<div class="card shadow p-4">
  <h3>Create Job</h3>

  <form method="POST">
    {% csrf_token %}
    {{ form|crispy }}
    <button class="btn btn-primary">Create Job</button>
  </form>
</div>
{% endblock %}
