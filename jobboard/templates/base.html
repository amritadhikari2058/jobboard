<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Job Board{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">

    <!-- Left -->
    <a class="navbar-brand fw-bold" href="{% url 'job_list' %}">
      Job Board
    </a>

    <!-- Right -->
    <div class="d-flex align-items-center gap-3">

      <!-- Notifications -->
      {% if user.is_authenticated %}
      <a href="{% url 'notifications' %}" class="text-white text-decoration-none position-relative">
        🔔
        {% if unread_notification_count > 0 %}
          <span class="badge bg-danger position-absolute top-0 start-100 translate-middle">
            {{ unread_notification_count }}
          </span>
        {% endif %}
      </a>
      {% endif %}

      <!-- Auth -->
      {% if user.is_authenticated %}
        <span class="text-white small">Hi, {{ user.username }}</span>
        <a href="{% url 'logout' %}" class="btn btn-sm btn-outline-light">Logout</a>
      {% else %}
        <a href="{% url 'login' %}" class="btn btn-sm btn-outline-light">Login</a>
      {% endif %}

    </div>

  </div>
</nav>

<!-- Content -->
<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
